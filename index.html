<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:20px}
body{
  font-family:system-ui,-apple-system,sans-serif;
  background:#0d1117;color:#e6edf3;
  display:flex;height:100vh;overflow:hidden
}
:focus-visible{outline:3px solid #58a6ff!important;outline-offset:2px}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:4px}
::-webkit-scrollbar-track{background:#161b22}

/* Sidebar */
.sidebar{
  width:360px;min-width:360px;background:#161b22;
  border-right:2px solid #30363d;display:flex;flex-direction:column
}
.sidebar h1{padding:18px 20px;font-size:1rem;border-bottom:2px solid #30363d}
.sidebar h1 span{color:#58a6ff}
.sidebar .search-bar{padding:12px 16px;border-bottom:2px solid #30363d}
.sidebar .search-bar input{
  width:100%;padding:12px 14px;border-radius:6px;
  border:2px solid #30363d;background:#0d1117;color:#e6edf3;
  font-size:.85rem
}
.sidebar .search-bar input:focus{border-color:#58a6ff}
.sidebar .count-bar{padding:8px 20px;font-size:.65rem;color:#8b949e;border-bottom:2px solid #21262d}
.sidebar .list{flex:1;overflow-y:auto}
.sidebar .item{
  padding:12px 20px;cursor:pointer;font-size:.8rem;
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid #21262d;min-height:52px
}
.sidebar .item:hover,.sidebar .item.active{background:#1c2128}
.sidebar .item.active{border-left:4px solid #58a6ff}
.sidebar .item .flag{font-size:1.2rem}
.sidebar .item .label{flex:1;font-weight:500}
.sidebar .item .tag{font-size:.55rem;color:#58a6ff;background:#1f6feb22;padding:3px 8px;border-radius:4px}

/* Main */
.main{flex:1;display:flex;flex-direction:column;min-width:0}

/* Top bar */
.topbar{
  padding:12px 20px;border-bottom:2px solid #30363d;
  display:flex;gap:10px;align-items:center;flex-shrink:0
}
.topbar h2{font-size:1rem;white-space:nowrap}
.topbar h2 span{color:#58a6ff}
.topbar input{
  flex:1;padding:10px 14px;border-radius:6px;
  border:2px solid #30363d;background:#0d1117;color:#e6edf3;
  font-size:.8rem;font-family:monospace
}
.topbar input:focus{border-color:#58a6ff}
.topbar button{
  padding:10px 20px;border-radius:6px;border:none;
  font-size:.8rem;font-weight:600;cursor:pointer;min-height:44px;white-space:nowrap
}
.topbar .btn-load{background:#238636;color:#fff}
.topbar .btn-load:hover{background:#2ea043}
.topbar .btn-copy{background:#21262d;color:#e6edf3;border:2px solid #30363d}
.topbar .btn-copy:hover{background:#30363d}
.topbar .btn-browse{background:#1f6feb;color:#fff;padding:8px 14px;font-size:.7rem;min-height:38px}
.topbar .btn-browse:hover{background:#388bfd}

/* Tabs */
.tabs{
  display:flex;border-bottom:2px solid #30363d;
  background:#161b22;flex-shrink:0
}
.tab{
  padding:12px 24px;font-size:.8rem;font-weight:600;
  cursor:pointer;color:#8b949e;border-bottom:3px solid transparent;
  min-height:48px;display:flex;align-items:center;gap:6px
}
.tab:hover{color:#e6edf3;background:#1c2128}
.tab.active{color:#58a6ff;border-bottom-color:#58a6ff}
.tab .badge{font-size:.55rem;background:#21262d;padding:2px 8px;border-radius:8px;color:#8b949e}
.tab.active .badge{background:#1f6feb22;color:#58a6ff}

/* Channel header */
.channel-header{
  padding:10px 20px;border-bottom:2px solid #21262d;
  display:flex;justify-content:space-between;align-items:center;flex-shrink:0
}
.channel-header .title{font-weight:700;font-size:.9rem}
.channel-header .count{font-size:.7rem;color:#8b949e}

/* Channel filter */
.channel-filter{padding:10px 20px;border-bottom:2px solid #21262d;flex-shrink:0}
.channel-filter input{
  width:100%;padding:10px 14px;border-radius:6px;
  border:2px solid #30363d;background:#0d1117;color:#e6edf3;font-size:.8rem
}
.channel-filter input:focus{border-color:#58a6ff}

/* Channel list */
.channel-list{flex:1;overflow-y:auto}
.channel-item{
  padding:12px 20px;border-bottom:1px solid #21262d;
  display:flex;align-items:center;gap:14px;min-height:64px;cursor:pointer
}
.channel-item:hover{background:#1c2128}
.channel-item .info{flex:1;min-width:0}
.channel-item .name{font-size:.85rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.channel-item .url{font-size:.5rem;color:#8b949e;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:monospace;margin-top:2px}
.channel-item .actions{display:flex;gap:8px;flex-shrink:0}
.channel-item .actions button{
  padding:8px 14px;border-radius:6px;border:none;
  font-size:.7rem;font-weight:600;cursor:pointer;min-height:40px;min-width:60px
}
.channel-item .actions .play{background:#238636;color:#fff}
.channel-item .actions .play:hover{background:#2ea043}
.channel-item .actions .copy{background:#21262d;color:#e6edf3;border:2px solid #30363d}
.channel-item .actions .copy:hover{background:#30363d}

/* Country group */
.country-group .group-header{
  padding:8px 20px;font-size:.8rem;font-weight:700;color:#58a6ff;
  background:#161b22;border-bottom:1px solid #21262d;
  display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:5
}
.country-group .group-header .flag{font-size:1rem}
.country-group .group-header .num{font-size:.55rem;color:#8b949e;margin-left:auto}

/* States */
.empty-state,.loading-state{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:100%;color:#8b949e;gap:12px
}
.spinner{width:28px;height:28px;border:3px solid #30363d;border-top-color:#58a6ff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Player modal */
.player-overlay{display:none;position:fixed;inset:0;background:#000;z-index:1000}
.player-overlay.open{display:block}
.player-wrap{width:100%;height:100%;display:flex;flex-direction:column;background:#000}
.player-head{
  position:absolute;top:0;left:0;right:0;z-index:10;
  padding:14px 20px;display:flex;justify-content:space-between;
  align-items:center;background:linear-gradient(rgba(0,0,0,.8),transparent)
}
.player-head h2{font-size:.9rem;font-weight:600}
.player-head .close{
  background:rgba(255,255,255,.15);border:none;color:#fff;
  font-size:1.3rem;cursor:pointer;padding:8px 16px;border-radius:6px;min-height:44px;min-width:44px
}
.player-head .close:hover{background:rgba(255,255,255,.3)}
.player-body{flex:1;display:flex;align-items:center;justify-content:center}
.player-body video{width:100%;height:100%;object-fit:contain;background:#000}

/* Toast */
.toast{
  position:fixed;bottom:36px;left:50%;transform:translateX(-50%);
  background:#238636;color:#fff;padding:14px 36px;border-radius:10px;
  font-size:.9rem;z-index:2000;opacity:0;transition:opacity .3s;
  pointer-events:none;font-weight:600
}
.toast.show{opacity:1}

@media(max-width:1200px){html{font-size:16px}.sidebar{width:300px;min-width:300px}}
@media(max-width:768px){html{font-size:14px}.sidebar{width:260px;min-width:260px}.channel-item{flex-direction:column;align-items:flex-start}.channel-item .actions{align-self:flex-end}}
@media(max-width:600px){.sidebar{display:none}.sidebar.open{display:flex;position:fixed;inset:0;z-index:500;width:100%}.topbar{flex-wrap:wrap}}
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <h1>📺 <span>IPTV</span></h1>
  <div class="search-bar"><input type="text" id="searchPlaylists" placeholder="Search countries..."></div>
  <div class="count-bar" id="countBar"></div>
  <div class="list" id="playlistList"></div>
</div>

<div class="main">
  <div class="topbar">
    <h2>📺 <span>IPTV</span></h2>
    <button class="btn-browse" id="btnBrowse">☰ Browse</button>
    <input type="text" id="customUrl" placeholder="Paste M3U URL...">
    <button class="btn-load" id="btnLoad">Load</button>
    <button class="btn-copy" id="btnCopy">Copy URL</button>
  </div>

  <div class="tabs" id="tabs">
    <div class="tab active" data-tab="countries">🌍 Country</div>
    <div class="tab" data-tab="movies">🎬 Movies <span class="badge" id="moviesBadge"></span></div>
    <div class="tab" data-tab="films">🎞️ Films <span class="badge" id="filmsBadge"></span></div>
  </div>

  <div class="channel-header">
    <span class="title" id="currentTitle">Select a country</span>
    <span class="count" id="channelCount"></span>
  </div>

  <div class="channel-filter" id="channelFilter">
    <input type="text" id="searchChannels" placeholder="Search channels...">
  </div>

  <div class="channel-list" id="channelList">
    <div class="empty-state"><p>Choose a country or category above</p></div>
  </div>
</div>

<div class="player-overlay" id="playerOverlay">
  <div class="player-wrap">
    <div class="player-head"><h2 id="playerTitle">Now Playing</h2><button class="close" id="btnClosePlayer">✕</button></div>
    <div class="player-body"><video id="playerVideo" controls autoplay playsinline></video></div>
  </div>
</div>

<div class="toast" id="toast"></div>

  }

  function buildPlaylists(){
    var files = ["ad","ae","af","ag","al","am","ao","ar","at","at_pluto","at_samsung","au","au_samsung","aw","az","ba","ba_morescreens","bb","bd","be","be_samsung","bf","bg","bh","bi","bj","bm","bn","bo","bq","br","br_pluto","br_samsung","bs","bw","by","bz","bz_nexgen","ca","ca_pluto","ca_samsung","ca_stingray","cd","cf","cg","ch","ch_pluto","ch_samsung","ci","cl","cm","cn","cn_112114","cn_cctv","cn_cgtn","cn_yeslivetv","co","cr","cu","cv","cw","cy","cz","de","de_pluto","de_rakuten","de_samsung","dj","dk","dk_pluto","dk_samsung","dm","do","dz","ec","ee","eg","eh","er","es","es_pluto","es_rakuten","es_samsung","es_yowi","et","fi","fi_rakuten","fi_samsung","fj","fm","fo","fr","fr_bfm","fr_fashiontv","fr_groupecanalplus","fr_groupem6","fr_persiana","fr_pluto","fr_rakuten","fr_samsung","ga","ge","gf","gh","gl","gm","gn","gp","gq","gr","gt","gt_streamhispanatv","gu","gy","hk","hn","hr","ht","hu","id","id_denstv","ie","ie_samsung","il","in","in_distro","in_doordarshan","in_pishow","in_samsung","in_tango","iq","ir","ir_telewebion","ir_wnslive","is","it","it_pluto","it_rakuten","it_samsung","jm","jo","jp","ke","kg","kh","kh_happywatch99","km","kn","kp","kr","kw","kz","la","lb","lc","li","lk","lr","lt","lu","lu_samsung","lv","ly","ma","mc","md","me","mg","mk","ml","mm","mn","mn_skygo","mo","mq","mr","mt","mt_smashplus","mu","mv","mw","mx","mx_amagi","mx_multimedios","mx_pluto","mx_samsung","my","mz","na","ne","ng","ni","nl","nl_samsung","no","no_pluto","no_samsung","np","nz","nz_samsung","om","pa","pe","pe_opencaster","pf","pg","ph","ph_comclark","pk","pl","pl_mediateka","pl_rakuten","pr","ps","pt","pt_samsung","py","qa","ro","rs","ru","ru_15plusmg","ru_bonustv","ru_catcast","ru_mylifeisgood","ru_ntv","ru_rt","ru_smotrim","ru_televizor24","ru_tvbricks","ru_tvteleport","ru_zabava","rw","sa","sd","se","se_pluto","se_samsung","sg","si","si_xploretv","sk","sk_antik","sl","sm","sn","so","so_premiumfree","sr","st","sv","sx","sy","td","tg","th","th_v2hcdn","tj","tl","tm","tn","tr","tr_ceren","tr_digiturk","tr_trt","tt","tv","tw","tz","ua","ua_olltv","ug","uk","us","us_pluto","us_samsung","us_stirr","us_xumo","uy","uz","vc","ve","vg","vi","vn","vu","ws","xk","ye","za","zm","zw"];
    state.playlists = files.map(function(f){
      var parts=f.split('_'),cc=parts[0],prov=parts.slice(1).join('_');
      var pname='';if(prov&&providers[prov])pname=providers[prov];else if(prov)pname=prov.replace(/_/g,' ').replace(/\b\w/g,function(l){return l.toUpperCase()});
      return{id:f,name:countries[cc]||cc.toUpperCase(),provider:pname,country:countries[cc]||cc.toUpperCase(),url:RAW_BASE+'/'+f+'.m3u'};
    });
    state.playlists.sort(function(a,b){
      var d=a.country.localeCompare(b.country);if(d)return d;
      if(!a.provider&&b.provider)return -1;if(a.provider&&!b.provider)return 1;
      return(a.provider||'').localeCompare(b.provider||'');
    });
    renderPlaylists();
  }

  function renderPlaylists(filter){
    var list=document.getElementById('playlistList');
    var items=filter?state.playlists.filter(function(p){return p.country.toLowerCase().includes(filter)||(p.provider&&p.provider.toLowerCase().includes(filter))}):state.playlists;
    document.getElementById('countBar').textContent=items.length+' playlists';
    list.innerHTML=items.map(function(p){
      var active=p.id===state.playlistId?'active':'';
      var tag=p.provider?'<span class="tag">'+esc(p.provider)+'</span>':'';
      return '<div class="item '+active+'" data-id="'+p.id+'"><span class="flag">'+getFlag(p.id)+'</span><span class="label">'+esc(p.country)+'</span>'+tag+'</div>';
    }).join('');
  }

  function selectPlaylist(id){
    var p=state.playlists.find(function(x){return x.id===id});
    if(!p)return;
    state.playlistUrl=p.url;state.playlistId=id;
    currentTitle.textContent=p.country+(p.provider?' ('+p.provider+')':'');
    customUrl.value=p.url;
    loadM3u(p.url,function(chs){
      state.channels=chs;state.filtered=chs;
      renderFlat(chs);
      channelCount.textContent=chs.length+' channels';
      channelFilter.style.display='block';
      searchChannels.value='';
    });
    document.querySelectorAll('.item').forEach(function(el){el.classList.remove('active')});
    var el=document.querySelector('.item[data-id="'+id+'"]');if(el)el.classList.add('active');
  }

  function loadM3u(url,cb){
    channelList.innerHTML='<div class="loading-state"><div class="spinner"></div><span>Loading...</span></div>';
    channelCount.textContent='';channelFilter.style.display='none';
    fetch(url).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.text()})
      .then(function(d){cb(parseM3u(d))})
      .catch(function(err){channelList.innerHTML='<div class="empty-state"><p style="color:#f85149">Failed: '+esc(err.message)+'</p></div>'});
  }

  function renderFlat(chs){
    if(!chs.length){channelList.innerHTML='<div class="empty-state"><p>No channels found</p></div>';return}
    channelList.innerHTML=chs.map(function(ch,i){
      return '<div class="channel-item" data-idx="'+i+'">'
        +'<div class="info"><div class="name">'+esc(ch.name||'Unknown')+'</div><div class="url">'+esc(ch.url)+'</div></div>'
        +'<div class="actions"><button class="play" data-act="play">▶ Play</button><button class="copy" data-act="copy">Copy</button></div></div>';
    }).join('');
  }

  function renderByCountry(chs){
    var groups={};
    chs.forEach(function(ch){
      var cc=extractCountry(ch.tvgId)||'unknown';
      if(!groups[cc]) groups[cc]=[];groups[cc].push(ch);
    });
    var keys=Object.keys(groups).sort(function(a,b){
      return(countries[a]||a.toUpperCase()).localeCompare(countries[b]||b.toUpperCase());
    });
    if(!keys.length){channelList.innerHTML='<div class="empty-state"><p>No channels found</p></div>';return}
    var html='',idx=0;
    keys.forEach(function(cc){
      var chs=groups[cc];
      html+='<div class="country-group">'
        +'<div class="group-header"><span class="flag">'+getFlag(cc)+'</span>'+esc(countries[cc]||cc.toUpperCase())+'<span class="num">'+chs.length+'</span></div>';
      chs.forEach(function(ch){
        html+='<div class="channel-item" data-idx="'+idx+'">'
          +'<div class="info"><div class="name">'+esc(ch.name||'Unknown')+'</div><div class="url">'+esc(ch.url)+'</div></div>'
          +'<div class="actions"><button class="play" data-act="play">▶ Play</button><button class="copy" data-act="copy">Copy</button></div></div>';
        idx++;
      });
      html+='</div>';
    });
    channelList.innerHTML=html;
  }

  function loadCategory(url){
    currentTitle.textContent=state.tab==='movies'?'🎬 Movies':'🎞️ Films';
    loadM3u(url,function(chs){
      state.channels=chs;state.filtered=chs;
      renderByCountry(chs);
      channelCount.textContent=chs.length+' channels';
      channelFilter.style.display='block';
      searchChannels.value='';
    });
  }

  function switchTab(tab){
    state.tab=tab;
    document.querySelectorAll('.tab').forEach(function(el){el.classList.remove('active')});
    document.querySelector('.tab[data-tab="'+tab+'"]').classList.add('active');
    searchChannels.value='';
    if(tab==='countries'){
      sidebar.style.display='flex';
      document.getElementById('btnBrowse').style.display='inline-block';
      if(state.playlistId) selectPlaylist(state.playlistId);
      else selectPlaylist('us');
    }else{
      sidebar.style.display='none';
      document.getElementById('btnBrowse').style.display='none';
      channelFilter.style.display='none';
      channelCount.textContent='';
      var url=tab==='movies'?CAT_BASE+'/movies.m3u':CAT_BASE+'/series.m3u';
      state.playlistUrl=url;customUrl.value=url;
      loadCategory(url);
    }
  }

  function playChannel(ch){
    document.getElementById('playerTitle').textContent=ch.name;
    document.getElementById('playerOverlay').classList.add('open');
    if(hls){hls.destroy();hls=null}
    video.removeAttribute('src');
    try{video.requestFullscreen()}catch(e){}
    if(ch.url.indexOf('.m3u8')>-1&&typeof Hls!=='undefined'&&Hls.isSupported()){
      hls=new Hls();
      hls.loadSource(ch.url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED,function(){video.play().catch(function(){})});
    }else{
      video.src=ch.url;
      video.play().catch(function(){});
    }
  }

  function closePlayer(){
    document.getElementById('playerOverlay').classList.remove('open');
    if(hls){hls.destroy();hls=null}
    video.removeAttribute('src');
    if(document.fullscreenElement)document.exitFullscreen();
  }

  function loadCustomUrl(){
    var url=customUrl.value.trim();
    if(!url)return;
    state.playlistUrl=url;state.playlistId=null;
    currentTitle.textContent='Custom Playlist';
    loadM3u(url,function(chs){
      state.channels=chs;state.filtered=chs;
      renderFlat(chs);
      channelCount.textContent=chs.length+' channels';
      channelFilter.style.display='block';
      searchChannels.value='';
    });
  }

  /* Events */

  document.getElementById('tabs').addEventListener('click',function(e){
    var tab=e.target.closest('.tab');if(!tab)return;
    switchTab(tab.dataset.tab);
  });

  document.getElementById('btnBrowse').addEventListener('click',function(){
    sidebar.classList.toggle('open');
  });

  document.getElementById('btnLoad').addEventListener('click',loadCustomUrl);

  document.getElementById('btnCopy').addEventListener('click',function(){
    if(!state.playlistUrl)return showToast('No playlist loaded');
    navigator.clipboard.writeText(state.playlistUrl).then(function(){showToast('Copied!')}).catch(function(){});
  });

  document.getElementById('searchPlaylists').addEventListener('input',function(){
    renderPlaylists(this.value.toLowerCase());
  });

  document.getElementById('searchChannels').addEventListener('input',function(){
    var q=this.value.toLowerCase();
    state.filtered=state.channels.filter(function(ch){return ch.name.toLowerCase().includes(q)||ch.url.toLowerCase().includes(q)});
    if(state.tab==='countries') renderFlat(state.filtered);
    else renderByCountry(state.filtered);
  });

  document.getElementById('playlistList').addEventListener('click',function(e){
    var item=e.target.closest('.item');if(!item)return;
    selectPlaylist(item.dataset.id);
    if(window.innerWidth<=600)sidebar.classList.remove('open');
  });

  channelList.addEventListener('click',function(e){
    var btn=e.target.closest('button[data-act]');if(!btn)return;
    var item=btn.closest('.channel-item');if(!item)return;
    var ch=state.filtered[parseInt(item.dataset.idx)];if(!ch)return;
    if(btn.dataset.act==='play') playChannel(ch);
    else if(btn.dataset.act==='copy') navigator.clipboard.writeText(ch.url).then(function(){showToast('Copied!')}).catch(function(){});
  });

  document.getElementById('btnClosePlayer').addEventListener('click',closePlayer);
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closePlayer()});

  /* Init */
  buildPlaylists();
  switchTab('countries');
})();
</script>
</body>
</html>
