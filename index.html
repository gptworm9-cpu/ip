<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IPTV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:18px}
body{
  font-family:system-ui,-apple-system,sans-serif;
  background:#0d1117;color:#e6edf3;
  display:flex;height:100vh;overflow:hidden
}
:focus-visible{outline:3px solid #58a6ff!important;outline-offset:2px}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
::-webkit-scrollbar-track{background:transparent}

/* === SIDEBAR === */
.sidebar{
  width:340px;min-width:340px;background:#161b22;
  border-right:2px solid #30363d;display:flex;flex-direction:column;
  transition:transform .25s
}
.sidebar h1{padding:16px 18px;font-size:.95rem;border-bottom:2px solid #30363d}
.sidebar h1 span{color:#58a6ff}
.sidebar .sbar{padding:10px 14px;border-bottom:2px solid #30363d}
.sidebar .sbar input{
  width:100%;padding:10px 12px;border-radius:6px;
  border:2px solid #30363d;background:#0d1117;color:#e6edf3;font-size:.8rem
}
.sidebar .sbar input:focus{border-color:#58a6ff}
.sidebar .cnt{padding:6px 18px;font-size:.6rem;color:#8b949e;border-bottom:2px solid #21262d}
.sidebar .lst{flex:1;overflow-y:auto;outline:none}
.sidebar .itm{
  padding:10px 18px;cursor:pointer;font-size:.75rem;
  display:flex;align-items:center;gap:8px;
  border-bottom:1px solid #21262d;min-height:48px;outline:none
}
.sidebar .itm:hover,.sidebar .itm.focused,.sidebar .itm.active{background:#1c2128}
.sidebar .itm.active{border-left:4px solid #58a6ff}
.sidebar .itm .fl{font-size:1.1rem}
.sidebar .itm .lb{flex:1;font-weight:500}
.sidebar .itm .tg{font-size:.5rem;color:#58a6ff;background:#1f6feb22;padding:2px 6px;border-radius:4px}

/* === MAIN === */
.main{flex:1;display:flex;flex-direction:column;min-width:0}

/* Top bar */
.top{
  padding:10px 16px;border-bottom:2px solid #30363d;
  display:flex;gap:8px;align-items:center;flex-shrink:0;flex-wrap:wrap
}
.top h2{font-size:.95rem;white-space:nowrap}
.top h2 span{color:#58a6ff}
.top .inp{
  flex:1;min-width:120px;padding:8px 12px;border-radius:6px;
  border:2px solid #30363d;background:#0d1117;color:#e6edf3;
  font-size:.75rem;font-family:monospace
}
.top .inp:focus{border-color:#58a6ff}
.top button{
  padding:8px 14px;border-radius:6px;border:none;
  font-size:.75rem;font-weight:600;cursor:pointer;min-height:40px;white-space:nowrap
}
.top .bl{background:#238636;color:#fff}
.top .bl:hover{background:#2ea043}
.top .bc{background:#21262d;color:#e6edf3;border:2px solid #30363d}
.top .bc:hover{background:#30363d}
.top .bb{background:#1f6feb;color:#fff;padding:6px 12px;font-size:.65rem;min-height:36px}
.top .bb:hover{background:#388bfd}

/* Tabs */
.tabs{
  display:flex;border-bottom:2px solid #30363d;
  background:#161b22;flex-shrink:0;outline:none;overflow-x:auto
}
.tb{
  padding:10px 20px;font-size:.75rem;font-weight:600;
  cursor:pointer;color:#8b949e;border-bottom:3px solid transparent;
  min-height:44px;display:flex;align-items:center;gap:6px;outline:none;white-space:nowrap
}
.tb:hover,.tb.focused{color:#e6edf3;background:#1c2128}
.tb.active{color:#58a6ff;border-bottom-color:#58a6ff}
.tb .bd{font-size:.5rem;background:#21262d;padding:2px 6px;border-radius:6px;color:#8b949e}
.tb.active .bd{background:#1f6feb22;color:#58a6ff}

/* Channel header */
.chh{
  padding:8px 16px;border-bottom:2px solid #21262d;
  display:flex;justify-content:space-between;align-items:center;flex-shrink:0
}
.chh .tt{font-weight:700;font-size:.85rem}
.chh .cc{font-size:.65rem;color:#8b949e}

/* Channel filter */
.chf{padding:8px 16px;border-bottom:2px solid #21262d;flex-shrink:0}
.chf input{
  width:100%;padding:8px 12px;border-radius:6px;
  border:2px solid #30363d;background:#0d1117;color:#e6edf3;font-size:.75rem
}
.chf input:focus{border-color:#58a6ff}

/* Channel list */
.chl{flex:1;overflow-y:auto;outline:none}
.chi{
  padding:10px 16px;border-bottom:1px solid #21262d;
  display:flex;align-items:center;gap:12px;min-height:60px;cursor:pointer;outline:none
}
.chi:hover,.chi.focused{background:#1c2128}
.chi .inf{flex:1;min-width:0}
.chi .nm{font-size:.8rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chi .ur{font-size:.45rem;color:#8b949e;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:monospace;margin-top:1px}
.chi .ac{display:flex;gap:6px;flex-shrink:0}
.chi .ac button{
  padding:6px 12px;border-radius:6px;border:none;
  font-size:.65rem;font-weight:600;cursor:pointer;min-height:36px;min-width:54px;outline:none
}
.chi .ac .pl{background:#238636;color:#fff}
.chi .ac .pl:hover,.chi .ac .pl.focused{background:#2ea043}
.chi .ac .cp{background:#21262d;color:#e6edf3;border:2px solid #30363d}
.chi .ac .cp:hover,.chi .ac .cp.focused{background:#30363d}

/* Country group */
.cgr .gh{
  padding:6px 16px;font-size:.75rem;font-weight:700;color:#58a6ff;
  background:#161b22;border-bottom:1px solid #21262d;
  display:flex;align-items:center;gap:6px;position:sticky;top:0;z-index:5
}
.cgr .gh .fl{font-size:.9rem}
.cgr .gh .nu{font-size:.5rem;color:#8b949e;margin-left:auto}

/* States */
.emp,.lod{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:100%;color:#8b949e;gap:10px
}
.spn{width:24px;height:24px;border:3px solid #30363d;border-top-color:#58a6ff;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* Player modal */
.pov{display:none;position:fixed;inset:0;background:#000;z-index:1000}
.pov.op{display:block}
.pwr{width:100%;height:100%;display:flex;flex-direction:column;background:#000}
.phd{
  position:absolute;top:0;left:0;right:0;z-index:10;
  padding:12px 16px;display:flex;justify-content:space-between;
  align-items:center;background:linear-gradient(rgba(0,0,0,.8),transparent)
}
.phd h2{font-size:.85rem;font-weight:600}
.phd .cl{
  background:rgba(255,255,255,.15);border:none;color:#fff;
  font-size:1.2rem;cursor:pointer;padding:6px 14px;border-radius:6px;min-height:40px;min-width:40px;outline:none
}
.phd .cl:hover,.phd .cl.focused{background:rgba(255,255,255,.3)}
.pbd{flex:1;display:flex;align-items:center;justify-content:center}
.pbd video{width:100%;height:100%;object-fit:contain;background:#000}

/* Toast */
.tst{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
  background:#238636;color:#fff;padding:12px 30px;border-radius:8px;
  font-size:.85rem;z-index:2000;opacity:0;transition:opacity .3s;
  pointer-events:none;font-weight:600
}
.tst.sh{opacity:1}

/* === RESPONSIVE BREAKPOINTS === */

/* 4K TV - large everything */
@media(min-width:1921px){
  html{font-size:28px}
  .sidebar{width:480px;min-width:480px}
  .sidebar .itm{min-height:64px;padding:14px 24px;font-size:.8rem}
  .sidebar .itm .fl{font-size:1.4rem}
  .top{padding:16px 24px}
  .top button{min-height:52px;padding:10px 20px;font-size:.8rem}
  .top .inp{font-size:.8rem;padding:10px 16px}
  .chi{min-height:80px;padding:14px 24px}
  .chi .nm{font-size:.85rem}
  .chi .ac button{min-height:48px;min-width:70px;font-size:.7rem}
  .tb{min-height:56px;padding:12px 28px;font-size:.8rem}
  .chh{padding:12px 24px}
  .chh .tt{font-size:.95rem}
  .sidebar h1{padding:20px 24px;font-size:1rem}
}

/* HD TV (1080p-1200p) */
@media(min-width:1441px) and (max-width:1920px){
  html{font-size:22px}
  .sidebar{width:400px;min-width:400px}
  .sidebar .itm{min-height:56px}
  .chi{min-height:72px}
  .chi .ac button{min-height:44px}
  .top button{min-height:48px}
}

/* Desktop / large laptop */
@media(min-width:1025px) and (max-width:1440px){
  html{font-size:18px}
  .sidebar{width:320px;min-width:320px}
}

/* Small laptop / tablet landscape */
@media(min-width:769px) and (max-width:1024px){
  html{font-size:16px}
  .sidebar{width:280px;min-width:280px}
  .sidebar .itm{min-height:44px;padding:8px 14px;font-size:.7rem}
  .top{flex-wrap:nowrap}
  .top .inp{min-width:80px}
}

/* Tablet portrait */
@media(min-width:481px) and (max-width:768px){
  html{font-size:15px}
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:500;transform:translateX(-100%);width:300px;min-width:300px}
  .sidebar.op{transform:translateX(0)}
  .top{flex-wrap:nowrap}
  .top .inp{min-width:60px}
  .chi .ac{flex-direction:column;gap:4px}
  .chi .ac button{min-height:32px;min-width:48px;font-size:.6rem;padding:4px 8px}
}

/* Phone */
@media(max-width:480px){
  html{font-size:14px}
  body{flex-direction:column}
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:500;transform:translateX(-100%);width:85%;min-width:260px}
  .sidebar.op{transform:translateX(0)}
  .top{flex-wrap:wrap;gap:6px;padding:8px 10px}
  .top h2{font-size:.85rem}
  .top .inp{order:3;flex-basis:100%;min-width:0;font-size:.7rem}
  .top button{font-size:.65rem;min-height:36px;padding:6px 10px}
  .tb{padding:8px 12px;font-size:.65rem;min-height:38px}
  .chh{padding:6px 10px}
  .chh .tt{font-size:.75rem}
  .chi{padding:8px 10px;min-height:52px;flex-wrap:wrap}
  .chi .ac{flex-direction:row;gap:4px;flex-basis:100%;justify-content:flex-end;margin-top:4px}
  .chi .ac button{min-height:30px;min-width:44px;font-size:.55rem;padding:4px 8px}
  .chi .nm{font-size:.7rem}
  .chi .ur{font-size:.4rem}
  .cgr .gh{padding:4px 10px;font-size:.65rem}
  .sidebar h1{padding:12px 14px;font-size:.85rem}
  .sidebar .sbar{padding:8px 10px}
  .sidebar .itm{min-height:40px;padding:8px 14px;font-size:.65rem}
}
</style>
</head>

<div class="main">

  <div class="tabs" id="tbs" tabindex="0">

  <div class="chh">

    <span class="cc" id="chc"></span>
  </div>

  <div class="chf" id="chf">
    <input type="text" id="chs" placeholder="Search channels...">
  </div>

  <div class="chl" id="chl" tabindex="0">
    <div class="emp"><p>Choose a country or category above</p></div>
  </div>
</div>

<div class="pov" id="pov">
  <div class="pwr">
    <div class="phd"><h2 id="ptt">Now Playing</h2><button class="cl" id="pcl">✕</button></div>
    <div class="pbd"><video id="pvd" controls autoplay playsinline></video></div>
  </div>
</div>

<div class="tst" id="tst"></div>

  function gf(id){var c=id.split('_')[0];return fl[c]||''}
  function e(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
  function st(m){ts.textContent=m;ts.classList.add('sh');setTimeout(function(){ts.classList.remove('sh')},2000)}
  function ex(t){var m=t.match(/\.([a-z]{2})(?:@|$)/i);return m?m[1].toLowerCase():''}

  function pm(d){
    var o=[],c=null,l=d.split('\n');
    for(var i=0;i<l.length;i++){
      var t=l[i].trim();
      if(t.startsWith('#EXTM3U')) continue;
      if(t.startsWith('#EXTINF:')){
        c={name:'',url:'',tvgId:''};
        var m=t.match(/,(.+)$/);if(m)c.name=m[1].trim();
        var id=t.match(/tvg-id="([^"]*)"/);if(id)c.tvgId=id[1];
      }else if(t&&!t.startsWith('#')&&c){c.url=t;o.push(c);c=null}
    }
    return o;
  }

  function fc(s,c){
    return s.querySelectorAll(c);
  }

  function fw(con,sel,idx){
    var items=fc(con,sel);
    if(!items.length)return;
    if(idx<0)idx=0;if(idx>=items.length)idx=items.length-1;
    items.forEach(function(e){e.classList.remove('focused')});
    items[idx].classList.add('focused');items[idx].focus({preventScroll:false});
    items[idx].scrollIntoView({block:'nearest',behavior:'smooth'});
  }

  function gi(con,sel){
    var items=fc(con,sel);
    var f=con.querySelector(sel+'.focused');
    if(f)return Array.prototype.indexOf.call(items,f);
    var a=con.querySelector(sel+'.active');
    if(a)return Array.prototype.indexOf.call(items,a);
    return 0;
  }

  function fa(item,dir){
    var btns=item.querySelectorAll('button');
    var f=item.querySelector('button.focused');
    var idx=f?Array.prototype.indexOf.call(btns,f):-1;idx+=dir;
    if(idx<0||idx>=btns.length)return false;
    item.querySelectorAll('button').forEach(function(b){b.classList.remove('focused')});
    btns[idx].classList.add('focused');btns[idx].focus();return true;
  }

  document.addEventListener('keydown',function(e){
    if(document.getElementById('pov').classList.contains('op')){
      if(e.key==='Escape'){cp();e.preventDefault()}return;
    }
    var a=document.activeElement;
    if(a&&(a.classList.contains('tb')||a.closest('#tbs'))){
      if(e.key==='ArrowLeft'||e.key==='ArrowUp'){
        e.preventDefault();var tbs=fc(document.getElementById('tbs'),'.tb');
        var idx=gi(document.getElementById('tbs'),'.tb');
        idx=idx<=0?tbs.length-1:idx-1;fw(document.getElementById('tbs'),'.tb',idx);tbs[idx].click();return;
      }
      if(e.key==='ArrowRight'||e.key==='ArrowDown'){
        e.preventDefault();var tbs=fc(document.getElementById('tbs'),'.tb');
        var idx=gi(document.getElementById('tbs'),'.tb');
        idx=idx>=tbs.length-1?0:idx+1;fw(document.getElementById('tbs'),'.tb',idx);tbs[idx].click();return;
      }
      if(e.key==='Enter'||e.key==='ArrowDown'){
        e.preventDefault();cl.focus();var its=cl.querySelectorAll('.chi');
        if(its.length)fw(cl,'.chi',0);return;
      }
    }
    if(a&&(a.classList.contains('itm')||a.closest('#pll')||a.closest('.sidebar'))){
      if(e.key==='ArrowDown'){e.preventDefault();fw(pl,'.itm',gi(pl,'.itm')+1);return}
      if(e.key==='ArrowUp'){e.preventDefault();fw(pl,'.itm',gi(pl,'.itm')-1);return}
      if(e.key==='Enter'){
        e.preventDefault();var f=pl.querySelector('.itm.focused');
        if(!f)f=pl.querySelector('.itm.active');if(f)sp(f.dataset.id);return;
      }
      if(e.key==='ArrowRight'){e.preventDefault();cl.focus();var its=cl.querySelectorAll('.chi');if(its.length)fw(cl,'.chi',0);return}
    }
    if(a&&(a.classList.contains('chi')||a.closest('.chl')||a.classList.contains('chl')||(a.tagName==='BUTTON'&&a.closest('.chi')))){
      if(e.key==='ArrowDown'){e.preventDefault();fw(cl,'.chi',gi(cl,'.chi')+1);return}
      if(e.key==='ArrowUp'){e.preventDefault();fw(cl,'.chi',gi(cl,'.chi')-1);return}
      if(e.key==='ArrowRight'){e.preventDefault();var fi=cl.querySelector('.chi.focused');if(fi){fa(fi,1)}return}
      if(e.key==='ArrowLeft'){e.preventDefault();var fi=cl.querySelector('.chi.focused');if(fi){if(fa(fi,-1))return}
        document.getElementById('tbs').focus();var tbs=fc(document.getElementById('tbs'),'.tb');
        var at=document.querySelector('.tb.active');if(at){tbs.forEach(function(t){t.classList.remove('focused')});at.classList.add('focused');at.focus()}return
      }
      if(e.key==='Enter'){e.preventDefault();var fi=cl.querySelector('.chi.focused');var fb=cl.querySelector('button.focused');
        if(fb){fb.click();return}if(fi){var pb=fi.querySelector('.pl');if(pb)pb.click()}return
      }
    }
  });

  document.addEventListener('click',function(e){
    var chi=e.target.closest('.chi');
    if(chi){cl.querySelectorAll('.chi').forEach(function(i){i.classList.remove('focused')});cl.querySelectorAll('button').forEach(function(b){b.classList.remove('focused')});chi.classList.add('focused');chi.focus()}
    var pi=e.target.closest('.itm');
    if(pi){pl.querySelectorAll('.itm').forEach(function(i){i.classList.remove('focused')});pi.classList.add('focused');pi.focus()}
    var t=e.target.closest('.tb');
    if(t){document.querySelectorAll('.tb').forEach(function(tb){tb.classList.remove('focused')});t.classList.add('focused');t.focus()}
  });

  function bp(){
    var fs=["ad","ae","af","ag","al","am","ao","ar","at","at_pluto","at_samsung","au","au_samsung","aw","az","ba","ba_morescreens","bb","bd","be","be_samsung","bf","bg","bh","bi","bj","bm","bn","bo","bq","br","br_pluto","br_samsung","bs","bw","by","bz","bz_nexgen","ca","ca_pluto","ca_samsung","ca_stingray","cd","cf","cg","ch","ch_pluto","ch_samsung","ci","cl","cm","cn","cn_112114","cn_cctv","cn_cgtn","cn_yeslivetv","co","cr","cu","cv","cw","cy","cz","de","de_pluto","de_rakuten","de_samsung","dj","dk","dk_pluto","dk_samsung","dm","do","dz","ec","ee","eg","eh","er","es","es_pluto","es_rakuten","es_samsung","es_yowi","et","fi","fi_rakuten","fi_samsung","fj","fm","fo","fr","fr_bfm","fr_fashiontv","fr_groupecanalplus","fr_groupem6","fr_persiana","fr_pluto","fr_rakuten","fr_samsung","ga","ge","gf","gh","gl","gm","gn","gp","gq","gr","gt","gt_streamhispanatv","gu","gy","hk","hn","hr","ht","hu","id","id_denstv","ie","ie_samsung","il","in","in_distro","in_doordarshan","in_pishow","in_samsung","in_tango","iq","ir","ir_telewebion","ir_wnslive","is","it","it_pluto","it_rakuten","it_samsung","jm","jo","jp","ke","kg","kh","kh_happywatch99","km","kn","kp","kr","kw","kz","la","lb","lc","li","lk","lr","lt","lu","lu_samsung","lv","ly","ma","mc","md","me","mg","mk","ml","mm","mn","mn_skygo","mo","mq","mr","mt","mt_smashplus","mu","mv","mw","mx","mx_amagi","mx_multimedios","mx_pluto","mx_samsung","my","mz","na","ne","ng","ni","nl","nl_samsung","no","no_pluto","no_samsung","np","nz","nz_samsung","om","pa","pe","pe_opencaster","pf","pg","ph","ph_comclark","pk","pl","pl_mediateka","pl_rakuten","pr","ps","pt","pt_samsung","py","qa","ro","rs","ru","ru_15plusmg","ru_bonustv","ru_catcast","ru_mylifeisgood","ru_ntv","ru_rt","ru_smotrim","ru_televizor24","ru_tvbricks","ru_tvteleport","ru_zabava","rw","sa","sd","se","se_pluto","se_samsung","sg","si","si_xploretv","sk","sk_antik","sl","sm","sn","so","so_premiumfree","sr","st","sv","sx","sy","td","tg","th","th_v2hcdn","tj","tl","tm","tn","tr","tr_ceren","tr_digiturk","tr_trt","tt","tv","tw","tz","ua","ua_olltv","ug","uk","us","us_pluto","us_samsung","us_stirr","us_xumo","uy","uz","vc","ve","vg","vi","vn","vu","ws","xk","ye","za","zm","zw"];
    S.pl=fs.map(function(f){
      var p=f.split('_'),cc=p[0],pv=p.slice(1).join('_');
      var pn='';if(pv&&pr[pv])pn=pr[pv];else if(pv)pn=pv.replace(/_/g,' ').replace(/\b\w/g,function(l){return l.toUpperCase()});
      return{id:f,name:co[cc]||cc.toUpperCase(),provider:pn,country:co[cc]||cc.toUpperCase(),url:RAW+'/'+f+'.m3u'};
    });
    S.pl.sort(function(a,b){var d=a.country.localeCompare(b.country);if(d)return d;if(!a.provider&&b.provider)return -1;if(a.provider&&!b.provider)return 1;return(a.provider||'').localeCompare(b.provider||'')});
    rp();
  }

  function rp(f){
    var items=f?S.pl.filter(function(p){return p.country.toLowerCase().includes(f)||(p.provider&&p.provider.toLowerCase().includes(f))}):S.pl;
    document.getElementById('cnt').textContent=items.length+' playlists';
    pl.innerHTML=items.map(function(p){var a=p.id===S.pid?'active':'';var t=p.provider?'<span class="tg">'+e(p.provider)+'</span>':'';return '<div class="itm '+a+'" data-id="'+p.id+'" tabindex="-1"><span class="fl">'+gf(p.id)+'</span><span class="lb">'+e(p.country)+'</span>'+t+'</div>'}).join('');
  }

  function sp(id){
    var p=S.pl.find(function(x){return x.id===id});if(!p)return;
    S.purl=p.url;S.pid=id;
    ct.textContent=p.country+(p.provider?' ('+p.provider+')':'');cu.value=p.url;
    lm(p.url,function(chs){S.ch=chs;S.fi=chs;rf(chs);cc.textContent=chs.length+' channels';cf.style.display='block';cs.value=''});
    document.querySelectorAll('.itm').forEach(function(el){el.classList.remove('active')});
    var el=document.querySelector('.itm[data-id="'+id+'"]');if(el)el.classList.add('active');
  }

  function lm(url,cb){
    cl.innerHTML='<div class="lod"><div class="spn"></div><span>Loading...</span></div>';
    cc.textContent='';cf.style.display='none';
    fetch(url).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.text()}).then(function(d){cb(pm(d))}).catch(function(err){cl.innerHTML='<div class="emp"><p style="color:#f85149">Failed: '+e(err.message)+'</p></div>'});
  }

  function rf(cc){
    if(!cc.length){cl.innerHTML='<div class="emp"><p>No channels found</p></div>';return}
    cl.innerHTML=cc.map(function(ch,i){return '<div class="chi" data-idx="'+i+'" tabindex="-1"><div class="inf"><div class="nm">'+e(ch.name||'Unknown')+'</div><div class="ur">'+e(ch.url)+'</div></div><div class="ac"><button class="pl" data-act="pl" tabindex="-1">▶ Play</button><button class="cp" data-act="cp" tabindex="-1">Copy</button></div></div>'}).join('');
  }

  function rb(cc){
    var g={};cc.forEach(function(ch){var c=ex(ch.tvgId)||'unknown';if(!g[c])g[c]=[];g[c].push(ch)});
    var k=Object.keys(g).sort(function(a,b){return(co[a]||a.toUpperCase()).localeCompare(co[b]||b.toUpperCase())});
    if(!k.length){cl.innerHTML='<div class="emp"><p>No channels found</p></div>';return}
    var h='',idx=0;
    k.forEach(function(c){var chs=g[c];h+='<div class="cgr"><div class="gh"><span class="fl">'+gf(c)+'</span>'+e(co[c]||c.toUpperCase())+'<span class="nu">'+chs.length+'</span></div>';chs.forEach(function(ch){h+='<div class="chi" data-idx="'+idx+'" tabindex="-1"><div class="inf"><div class="nm">'+e(ch.name||'Unknown')+'</div><div class="ur">'+e(ch.url)+'</div></div><div class="ac"><button class="pl" data-act="pl" tabindex="-1">▶ Play</button><button class="cp" data-act="cp" tabindex="-1">Copy</button></div></div>';idx++});h+='</div>'});
    cl.innerHTML=h;
  }

  function lc(url){
    ct.textContent=S.tab==='m'?'🎬 Movies':'🎞️ Films';
    lm(url,function(chs){S.ch=chs;S.fi=chs;rb(chs);cc.textContent=chs.length+' channels';cf.style.display='block';cs.value=''});
  }

  function sw(t){
    S.tab=t;
    document.querySelectorAll('.tb').forEach(function(el){el.classList.remove('active')});
    var tb=document.querySelector('.tb[data-tab="'+t+'"]');if(tb)tb.classList.add('active');
    cs.value='';
    if(t==='c'){sb.style.display='flex';document.getElementById('bbr').style.display='inline-block';if(S.pid)sp(S.pid);else sp('us')}
    else{sb.style.display='none';document.getElementById('bbr').style.display='none';cf.style.display='none';cc.textContent='';var u=t==='m'?CAT+'/movies.m3u':CAT+'/series.m3u';S.purl=u;cu.value=u;lc(u)}
  }

  function pch(ch){
    document.getElementById('ptt').textContent=ch.name;
    document.getElementById('pov').classList.add('op');
    if(hls){hls.destroy();hls=null}
    v.removeAttribute('src');
    try{v.requestFullscreen()}catch(e){}
    if(ch.url.indexOf('.m3u8')>-1&&typeof Hls!=='undefined'&&Hls.isSupported()){hls=new Hls();hls.loadSource(ch.url);hls.attachMedia(v);hls.on(Hls.Events.MANIFEST_PARSED,function(){v.play().catch(function(){})})}
    else{v.src=ch.url;v.play().catch(function(){})}
  }

  function cp(){
    document.getElementById('pov').classList.remove('op');
    if(hls){hls.destroy();hls=null}
    v.removeAttribute('src');if(document.fullscreenElement)document.exitFullscreen();
  }

  function lcu(){
    var u=cu.value.trim();if(!u)return;
    S.purl=u;S.pid=null;ct.textContent='Custom Playlist';
    lm(u,function(chs){S.ch=chs;S.fi=chs;rf(chs);cc.textContent=chs.length+' channels';cf.style.display='block';cs.value=''});
  }

  document.getElementById('tbs').addEventListener('click',function(e){var t=e.target.closest('.tb');if(t)sw(t.dataset.tab)});
  document.getElementById('bbr').addEventListener('click',function(){sb.classList.toggle('op')});
  document.getElementById('bld').addEventListener('click',lcu);
  document.getElementById('bcp').addEventListener('click',function(){if(!S.purl)return st('No playlist loaded');navigator.clipboard.writeText(S.purl).then(function(){st('Copied!')}).catch(function(){})});
  document.getElementById('spl').addEventListener('input',function(){rp(this.value.toLowerCase())});
  document.getElementById('chs').addEventListener('input',function(){var q=this.value.toLowerCase();S.fi=S.ch.filter(function(ch){return ch.name.toLowerCase().includes(q)||ch.url.toLowerCase().includes(q)});if(S.tab==='c')rf(S.fi);else rb(S.fi)});
  document.getElementById('pll').addEventListener('click',function(e){var i=e.target.closest('.itm');if(!i)return;sp(i.dataset.id);if(window.innerWidth<=768)sb.classList.remove('op')});
  cl.addEventListener('click',function(e){var b=e.target.closest('button[data-act]');if(!b)return;var i=b.closest('.chi');if(!i)return;var c=S.fi[parseInt(i.dataset.idx)];if(!c)return;if(b.dataset.act==='pl')pch(c);else if(b.dataset.act==='cp')navigator.clipboard.writeText(c.url).then(function(){st('Copied!')}).catch(function(){})});
  document.getElementById('pcl').addEventListener('click',cp);
  document.addEventListener('keydown',function(e){if(e.key==='Escape')cp()});

  bp();
  sw('c');
})();
</script>
