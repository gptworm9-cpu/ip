<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Panel</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 20px; }
body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #0d1117; color: #e6edf3;
  display: flex; height: 100vh; overflow: hidden;
  -webkit-font-smoothing: antialiased;
}
:focus { outline: 3px solid #58a6ff !important; outline-offset: 2px; }
:focus:not(:focus-visible) { outline: none !important; }
:focus-visible { outline: 3px solid #58a6ff !important; outline-offset: 2px; }
::-webkit-scrollbar { width: 10px; }
::-webkit-scrollbar-thumb { background: #30363d; border-radius: 5px; }
::-webkit-scrollbar-track { background: #161b22; }

.sidebar {
  width: 380px; min-width: 380px; background: #161b22;
  border-right: 2px solid #30363d; display: flex; flex-direction: column;
}
.sidebar h1 {
  padding: 20px; font-size: 1.1rem; border-bottom: 2px solid #30363d;
  display: flex; align-items: center; gap: 10px;
}
.sidebar h1 span { color: #58a6ff; }
.sidebar-search { padding: 14px 16px; border-bottom: 2px solid #30363d; }
.sidebar-search input {
  width: 100%; padding: 14px 16px; border-radius: 8px;
  border: 2px solid #30363d; background: #0d1117; color: #e6edf3;
  font-size: 0.9rem; outline: none;
}
.sidebar-search input:focus { border-color: #58a6ff; }
.playlist-count { padding: 10px 20px; font-size: 0.7rem; color: #8b949e; border-bottom: 2px solid #21262d; }
.playlist-list { flex: 1; overflow-y: auto; }
.playlist-item {
  padding: 14px 20px; cursor: pointer; font-size: 0.85rem;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid #21262d; transition: background 0.15s;
  min-height: 56px;
}
.playlist-item:hover, .playlist-item:focus-visible { background: #1c2128; }
.playlist-item.active { background: #1f6feb22; border-left: 4px solid #58a6ff; }
.playlist-item .flag { font-size: 1.4rem; }
.playlist-item .name { flex: 1; font-weight: 500; }
.playlist-item .badge { font-size: 0.6rem; color: #8b949e; background: #21262d; padding: 4px 10px; border-radius: 10px; }
.playlist-item .provider { font-size: 0.6rem; color: #58a6ff; background: #1f6feb22; padding: 4px 10px; border-radius: 6px; }

.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

.topbar {
  padding: 14px 24px; border-bottom: 2px solid #30363d;
  display: flex; gap: 12px; align-items: center; flex-shrink: 0;
}
.topbar h2 { font-size: 1.1rem; white-space: nowrap; margin-right: 8px; }
.topbar h2 span { color: #58a6ff; }
.topbar input {
  flex: 1; padding: 12px 18px; border-radius: 8px;
  border: 2px solid #30363d; background: #0d1117; color: #e6edf3;
  font-size: 0.85rem; outline: none; font-family: monospace;
}
.topbar input:focus { border-color: #58a6ff; }
.topbar button {
  padding: 12px 24px; border-radius: 8px; border: none;
  background: #238636; color: #fff; cursor: pointer;
  font-size: 0.85rem; font-weight: 600; white-space: nowrap; min-height: 48px;
}
.topbar button:hover { background: #2ea043; }
.topbar .copy-url { background: #21262d; border: 2px solid #30363d; }
.topbar .copy-url:hover { background: #30363d; }

.tabs {
  display: flex; border-bottom: 2px solid #30363d; flex-shrink: 0;
  background: #161b22;
}
.tab {
  padding: 14px 28px; font-size: 0.85rem; font-weight: 600;
  cursor: pointer; color: #8b949e; border-bottom: 3px solid transparent;
  transition: all 0.15s; min-height: 52px; display: flex; align-items: center; gap: 8px;
}
.tab:hover { color: #e6edf3; background: #1c2128; }
.tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }
.tab .count { font-size: 0.6rem; background: #21262d; padding: 2px 10px; border-radius: 10px; color: #8b949e; }
.tab.active .count { background: #1f6feb22; color: #58a6ff; }

.channel-header {
  padding: 14px 24px; border-bottom: 2px solid #21262d;
  font-size: 0.8rem; color: #8b949e;
  display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
}
.channel-header .title { font-weight: 700; color: #e6edf3; font-size: 1rem; }

.channel-filter { padding: 12px 24px; border-bottom: 2px solid #21262d; flex-shrink: 0; }
.channel-filter input {
  width: 100%; padding: 12px 18px; border-radius: 8px;
  border: 2px solid #30363d; background: #0d1117; color: #e6edf3;
  font-size: 0.85rem; outline: none;
}
.channel-filter input:focus { border-color: #58a6ff; }

.channel-lists { flex: 1; overflow-y: auto; }

.channel-item {
  padding: 14px 24px; border-bottom: 1px solid #21262d;
  display: flex; align-items: center; gap: 16px;
  transition: background 0.15s; cursor: pointer; min-height: 68px;
}
.channel-item:hover, .channel-item:focus-visible { background: #1c2128; }
.channel-item .info { flex: 1; min-width: 0; }
.channel-item .ch-name { font-size: 0.9rem; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.channel-item .ch-url { font-size: 0.55rem; color: #8b949e; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: monospace; margin-top: 2px; }
.channel-item .ch-actions { display: flex; gap: 10px; flex-shrink: 0; }
.channel-item .ch-actions button {
  padding: 8px 16px; border-radius: 8px; border: none;
  font-size: 0.75rem; font-weight: 600; cursor: pointer; min-height: 42px; min-width: 70px;
}
.channel-item .ch-actions .play-btn { background: #238636; color: #fff; }
.channel-item .ch-actions .play-btn:hover { background: #2ea043; }
.channel-item .ch-actions .copy-btn { background: #21262d; color: #e6edf3; border: 2px solid #30363d; }
.channel-item .ch-actions .copy-btn:hover { background: #30363d; }

.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #8b949e; gap: 16px; }
.empty-state svg { opacity: 0.4; width: 80px; height: 80px; }
.empty-state p { font-size: 1rem; }
.loading { display: flex; align-items: center; justify-content: center; height: 100%; color: #8b949e; gap: 14px; font-size: 1rem; }
.spinner { width: 32px; height: 32px; border: 3px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.modal-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; }
.modal-overlay.open { display: block; }
.modal-content { width: 100%; height: 100%; display: flex; flex-direction: column; background: #000; }
.modal-header { position: absolute; top: 0; left: 0; right: 0; z-index: 10; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(rgba(0,0,0,0.8), transparent); }
.modal-header h2 { font-size: 1rem; font-weight: 600; }
.modal-header .close-btn { background: rgba(255,255,255,0.15); border: none; color: #fff; font-size: 1.4rem; cursor: pointer; padding: 8px 16px; border-radius: 8px; min-height: 48px; min-width: 48px; }
.modal-header .close-btn:hover { background: rgba(255,255,255,0.3); }
.modal-body { flex: 1; display: flex; align-items: center; justify-content: center; }
.modal-body video { width: 100%; height: 100%; object-fit: contain; background: #000; }

.toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: #238636; color: #fff; padding: 16px 40px; border-radius: 12px; font-size: 1rem; z-index: 2000; opacity: 0; transition: opacity 0.3s; pointer-events: none; font-weight: 600; }
.toast.show { opacity: 1; }

@media (max-width: 1200px) { html { font-size: 16px; } .sidebar { width: 300px; min-width: 300px; } }
@media (max-width: 768px) { html { font-size: 14px; } .sidebar { width: 260px; min-width: 260px; } .channel-item { flex-direction: column; align-items: flex-start; } .channel-item .ch-actions { align-self: flex-end; } }
@media (max-width: 600px) { .sidebar { display: none; } .sidebar.mobile-show { display: flex; position: fixed; inset: 0; z-index: 500; width: 100%; } .topbar { flex-wrap: wrap; } }
</style>
</head>
<body>

<div class="sidebar" id="sidebar" style="display:none">
  <h1>📺 <span>IPTV</span> <span style="font-size:0.6rem;color:#8b949e;margin-left:auto">Countries</span></h1>
  <div class="sidebar-search"><input type="text" id="sidebarSearch" placeholder="Search countries..." oninput="filterPlaylists()"></div>
  <div class="playlist-count" id="playlistCount"></div>
  <div class="playlist-list" id="playlistList"></div>
</div>

<div class="main">
  <div class="topbar">
    <h2>📺 <span>IPTV</span></h2>
    <button id="showSidebarBtn" style="background:#1f6feb;padding:8px 16px;font-size:0.75rem;min-height:40px" onclick="toggleSidebar()">☰ Browse</button>
    <input type="text" id="customUrl" placeholder="Paste any M3U URL...">
    <button onclick="loadCustomUrl()">Load</button>
    <button class="copy-url" onclick="copyCurrentUrl()">Copy URL</button>
  </div>

  <div class="tabs" id="tabs">
    <div class="tab active" data-tab="countries" onclick="switchTab('countries')">🌍 Country</div>
    <div class="tab" data-tab="movies" onclick="switchTab('movies')">🎬 Movies <span class="count" id="countMovies"></span></div>
    <div class="tab" data-tab="films" onclick="switchTab('films')">🎞️ Films <span class="count" id="countFilms"></span></div>
  </div>

  <div class="channel-header">
    <span class="title" id="currentPlaylistName">Select a country</span>
    <span id="channelCount"></span>
  </div>

  <div class="channel-filter" id="channelFilter" style="display:none">
    <input type="text" id="channelSearch" placeholder="Search channels..." oninput="filterChannels()">
  </div>

  <div class="channel-lists" id="channelList">
    <div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg><p>Choose a country or category above</p></div>
  </div>
</div>

<div class="modal-overlay" id="playerModal">
  <div class="modal-content">
    <div class="modal-header"><h2 id="playerTitle">Now Playing</h2><button class="close-btn" onclick="closePlayer()">✕</button></div>
    <div class="modal-body"><video id="playerVideo" controls autoplay playsinline></video></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

const FLAGS = {"ad":"🇦🇩","ae":"🇦🇪","af":"🇦🇫","ag":"🇦🇬","al":"🇦🇱","am":"🇦🇲","ao":"🇦🇴","ar":"🇦🇷","at":"🇦🇹","au":"🇦🇺","aw":"🇦🇼","az":"🇦🇿","ba":"🇧🇦","bb":"🇧🇧","bd":"🇧🇩","be":"🇧🇪","bf":"🇧🇫","bg":"🇧🇬","bh":"🇧🇭","bi":"🇧🇮","bj":"🇧🇯","bm":"🇧🇲","bn":"🇧🇳","bo":"🇧🇴","bq":"🇧🇶","br":"🇧🇷","bs":"🇧🇸","bw":"🇧🇼","by":"🇧🇾","bz":"🇧🇿","ca":"🇨🇦","cd":"🇨🇩","cf":"🇨🇫","cg":"🇨🇬","ch":"🇨🇭","ci":"🇨🇮","cl":"🇨🇱","cm":"🇨🇲","cn":"🇨🇳","co":"🇨🇴","cr":"🇨🇷","cu":"🇨🇺","cv":"🇨🇻","cw":"🇨🇼","cy":"🇨🇾","cz":"🇨🇿","de":"🇩🇪","dj":"🇩🇯","dk":"🇩🇰","dm":"🇩🇲","do":"🇩🇴","dz":"🇩🇿","ec":"🇪🇨","ee":"🇪🇪","eg":"🇪🇬","eh":"🇪🇭","er":"🇪🇷","es":"🇪🇸","et":"🇪🇹","fi":"🇫🇮","fj":"🇫🇯","fm":"🇫🇲","fo":"🇫🇴","fr":"🇫🇷","ga":"🇬🇦","ge":"🇬🇪","gf":"🇬🇫","gh":"🇬🇭","gl":"🇬🇱","gm":"🇬🇲","gn":"🇬🇳","gp":"🇬🇵","gq":"🇬🇶","gr":"🇬🇷","gt":"🇬🇹","gu":"🇬🇺","gy":"🇬🇾","hk":"🇭🇰","hn":"🇭🇳","hr":"🇭🇷","ht":"🇭🇹","hu":"🇭🇺","id":"🇮🇩","ie":"🇮🇪","il":"🇮🇱","in":"🇮🇳","iq":"🇮🇶","ir":"🇮🇷","is":"🇮🇸","it":"🇮🇹","jm":"🇯🇲","jo":"🇯🇴","jp":"🇯🇵","ke":"🇰🇪","kg":"🇰🇬","kh":"🇰🇭","km":"🇰🇲","kn":"🇰🇳","kp":"🇰🇵","kr":"🇰🇷","kw":"🇰🇼","kz":"🇰🇿","la":"🇱🇦","lb":"🇱🇧","lc":"🇱🇨","li":"🇱🇮","lk":"🇱🇰","lr":"🇱🇷","lt":"🇱🇹","lu":"🇱🇺","lv":"🇱🇻","ly":"🇱🇾","ma":"🇲🇦","mc":"🇲🇨","md":"🇲🇩","me":"🇲🇪","mg":"🇲🇬","mk":"🇲🇰","ml":"🇲🇱","mm":"🇲🇲","mn":"🇲🇳","mo":"🇲🇴","mq":"🇲🇶","mr":"🇲🇷","mt":"🇲🇹","mu":"🇲🇺","mv":"🇲🇻","mw":"🇲🇼","mx":"🇲🇽","my":"🇲🇾","mz":"🇲🇿","na":"🇳🇦","ne":"🇳🇪","ng":"🇳🇬","ni":"🇳🇮","nl":"🇳🇱","no":"🇳🇴","np":"🇳🇵","nz":"🇳🇿","om":"🇴🇲","pa":"🇵🇦","pe":"🇵🇪","pf":"🇵🇫","pg":"🇵🇬","ph":"🇵🇭","pk":"🇵🇰","pl":"🇵🇱","pr":"🇵🇷","ps":"🇵🇸","pt":"🇵🇹","py":"🇵🇾","qa":"🇶🇦","ro":"🇷🇴","rs":"🇷🇸","ru":"🇷🇺","rw":"🇷🇼","sa":"🇸🇦","sd":"🇸🇩","se":"🇸🇪","sg":"🇸🇬","si":"🇸🇮","sk":"🇸🇰","sl":"🇸🇱","sm":"🇸🇲","sn":"🇸🇳","so":"🇸🇴","sr":"🇸🇷","st":"🇸🇹","sv":"🇸🇻","sx":"🇸🇽","sy":"🇸🇾","td":"🇹🇩","tg":"🇹🇬","th":"🇹🇭","tj":"🇹🇯","tl":"🇹🇱","tm":"🇹🇲","tn":"🇹🇳","tr":"🇹🇷","tt":"🇹🇹","tw":"🇹🇼","tz":"🇹🇿","ua":"🇺🇦","ug":"🇺🇬","uk":"🇬🇧","us":"🇺🇸","uy":"🇺🇾","uz":"🇺🇿","va":"🇻🇦","ve":"🇻🇪","vg":"🇻🇬","vi":"🇻🇮","vn":"🇻🇳","ws":"🇼🇸","xk":"🇽🇰","ye":"🇾🇪","yt":"🇾🇹","za":"🇿🇦","zm":"🇿🇲","zw":"🇿🇼"};

const PROVIDER_PREFIXES = { 'pluto':'Pluto TV','samsung':'Samsung TV','rakuten':'Rakuten','distro':'Distro TV','bbc':'BBC','cbsn':'CBS News','pbs':'PBS','stirr':'Stirr','tubi':'Tubi','xumo':'Xumo','roku':'Roku','plex':'Plex','vizio':'Vizio','tcl':'TCL','firetv':'Fire TV','abcnews':'ABC News','amagi':'Amagi' };

function getFlag(code) { const c = code.split('_')[0]; return FLAGS[c] || ''; }

function extractCountry(tvgId) {
  if (!tvgId) return '';
  var m = tvgId.match(/\.([a-z]{2})(?:@|$)/i);
  return m ? m[1].toLowerCase() : '';
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(function(el) { el.classList.remove('active'); });
  document.querySelector('.tab[data-tab="'+tab+'"]').classList.add('active');
  document.getElementById('channelSearch').value = '';
  currentSource = tab;

  var sidebar = document.getElementById('sidebar');
  if (tab === 'countries') {
    sidebar.style.display = 'flex';
    document.getElementById('showSidebarBtn').style.display = 'inline-block';
    if (currentPlaylistUrl && currentPlaylistUrl.indexOf('/streams/') > -1) {
      selectPlaylist(currentPlaylistId);
    } else if (currentPlaylistId) {
      selectPlaylist(currentPlaylistId);
    } else {
      selectPlaylist('us');
    }
  } else {
    sidebar.style.display = 'none';
    document.getElementById('showSidebarBtn').style.display = 'none';
    document.getElementById('channelFilter').style.display = 'none';
    document.getElementById('channelCount').textContent = '';
    document.getElementById('currentPlaylistName').textContent = tab === 'movies' ? '🎬 Movies' : '🎞️ Films';

    var url = tab === 'movies'
      ? CAT_BASE + '/movies.m3u'
      : CAT_BASE + '/series.m3u';
    currentPlaylistUrl = url;
    loadCategory(url);
  }
}

function loadCategory(url) {
  var list = document.getElementById('channelList');
  list.innerHTML = '<div class="loading"><div class="spinner"></div><span>Loading...</span></div>';
  document.getElementById('channelFilter').style.display = 'none';
  document.getElementById('customUrl').value = url;

  fetch(url)
    .then(function(r) { if (!r.ok) throw new Error('HTTP '+r.status); return r.text(); })
    .then(function(data) {
      var channels = parseM3u(data);
      currentChannels = channels;
      filteredChannels = channels;
      var name = currentSource === 'movies' ? '🎬 Movies' : '🎞️ Films';
      displayChannelsByCountry(channels);
      document.getElementById('channelCount').textContent = channels.length + ' channels';
      document.getElementById('channelFilter').style.display = 'block';
      document.getElementById('channelSearch').value = '';
    })
    .catch(function(err) {
      list.innerHTML = '<div class="empty-state"><p style="color:#f85149">Failed: '+escapeHtml(err.message)+'</p></div>';
    });
}

function displayChannelsByCountry(channels) {
  var groups = {};
  for (var i = 0; i < channels.length; i++) {
    var ch = channels[i];
    var cc = extractCountry(ch.tvgId) || 'unknown';
    if (!groups[cc]) groups[cc] = [];
    groups[cc].push(ch);
  }

  var sorted = Object.keys(groups).sort(function(a, b) {
    var na = PLAYLISTS[a] || a.toUpperCase();
    var nb = PLAYLISTS[b] || b.toUpperCase();
    return na.localeCompare(nb);
  });

  var list = document.getElementById('channelList');
  if (!sorted.length) {
    list.innerHTML = '<div class="empty-state"><p>No channels found</p></div>';
    return;
  }

  var idx = 0;
  var html = '';
  for (var g = 0; g < sorted.length; g++) {
    var cc = sorted[g];
    var chs = groups[cc];
    html += '<div class="country-group">';
    html += '<div style="padding:10px 24px;font-size:0.85rem;font-weight:700;color:#58a6ff;background:#161b22;border-bottom:1px solid #21262d;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:5">';
    html += '<span style="font-size:1.2rem">'+getFlag(cc)+'</span>';
    html += escapeHtml(PLAYLISTS[cc] || cc.toUpperCase());
    html += '<span style="font-size:0.6rem;color:#8b949e;margin-left:auto">'+chs.length+'</span></div>';
    for (var c = 0; c < chs.length; c++) {
      html += '<div class="channel-item" data-idx="'+idx+'">'
        + '<div class="info">'
        + '<div class="ch-name">'+escapeHtml(chs[c].name||'Unknown')+'</div>'
        + '<div class="ch-url">'+escapeHtml(chs[c].url)+'</div>'
        + '</div>'
        + '<div class="ch-actions">'
        + '<button class="play-btn" data-action="play">▶ Play</button>'
        + '<button class="copy-btn" data-action="copy">Copy</button>'
        + '</div>'
        + '</div>';
      idx++;
    }
  }

  if (!html) {
    list.innerHTML = '<div class="empty-state"><p>No channels</p></div>';
    return;
  }
  list.innerHTML = html;
}

  allPlaylists.sort(function(a, b) {
    if (a.country !== b.country) return a.country.localeCompare(b.country);
    if (!a.providerName && b.providerName) return -1;

var allPlaylists = [];

function renderSidebar(playlists) {
  var list = document.getElementById('playlistList');
  document.getElementById('playlistCount').textContent = playlists.length + ' playlists';
  list.innerHTML = playlists.map(function(p) {
    var active = p.id === currentPlaylistId ? 'active' : '';
    var badge = p.providerName ? '<span class="provider">'+escapeHtml(p.providerName)+'</span>' : '<span class="badge">All</span>';
    return '<div class="playlist-item '+active+'" data-id="'+p.id+'" onclick="selectPlaylist(\''+p.id+'\')"><span class="flag">'+getFlag(p.id)+'</span><span class="name">'+escapeHtml(p.country)+'</span>'+badge+'</div>';
  }).join('');
}

function filterPlaylists() {
  var q = document.getElementById('sidebarSearch').value.toLowerCase();
  renderSidebar(allPlaylists.filter(function(p) { return p.country.toLowerCase().includes(q) || (p.providerName && p.providerName.toLowerCase().includes(q)); }));
}

function selectPlaylist(id) {
  var p = allPlaylists.find(function(x) { return x.id === id; });
  if (!p) return;
  currentPlaylistUrl = p.url;
  currentPlaylistId = id;
  document.getElementById('currentPlaylistName').textContent = p.country + (p.providerName ? ' ('+p.providerName+')' : '');

  var list = document.getElementById('channelList');
  list.innerHTML = '<div class="loading"><div class="spinner"></div><span>Loading...</span></div>';
  document.getElementById('channelCount').textContent = '';
  document.getElementById('channelFilter').style.display = 'none';
  document.getElementById('customUrl').value = p.url;

  fetch(p.url)
    .then(function(r) { if (!r.ok) throw new Error('HTTP '+r.status); return r.text(); })
    .then(function(data) {
      currentChannels = parseM3u(data);
      filteredChannels = currentChannels;
      displayChannelsFlat(currentChannels);
      document.getElementById('channelCount').textContent = currentChannels.length + ' channels';
      document.getElementById('channelFilter').style.display = 'block';
      document.getElementById('channelSearch').value = '';
    })
    .catch(function(err) {
      list.innerHTML = '<div class="empty-state"><p style="color:#f85149">Failed: '+escapeHtml(err.message)+'</p></div>';
    });

  document.querySelectorAll('.playlist-item').forEach(function(el) { el.classList.remove('active'); });
  var item = document.querySelector('.playlist-item[data-id="'+id+'"]');
  if (item) item.classList.add('active');
}

function loadCustomUrl() {
  var url = document.getElementById('customUrl').value.trim();
  if (!url) return;
  currentPlaylistUrl = url;
  currentPlaylistId = null;

  var list = document.getElementById('channelList');
  list.innerHTML = '<div class="loading"><div class="spinner"></div><span>Loading...</span></div>';
  document.getElementById('channelCount').textContent = '';
  document.getElementById('channelFilter').style.display = 'none';

  fetch(url)
    .then(function(r) { if (!r.ok) throw new Error('HTTP '+r.status); return r.text(); })
    .then(function(data) {
      currentChannels = parseM3u(data);
      filteredChannels = currentChannels;
      displayChannelsFlat(currentChannels);
      document.getElementById('channelCount').textContent = currentChannels.length + ' channels';
      document.getElementById('channelFilter').style.display = 'block';
      document.getElementById('channelSearch').value = '';
      document.getElementById('currentPlaylistName').textContent = 'Custom Playlist';
    })
    .catch(function(err) {
      list.innerHTML = '<div class="empty-state"><p style="color:#f85149">Failed: '+escapeHtml(err.message)+'</p></div>';
    });
}

function parseM3u(content) {
  var channels = [];
  var lines = content.split('\n');
  var current = null;
  for (var i = 0; i < lines.length; i++) {
    var t = lines[i].trim();
    if (t.startsWith('#EXTM3U')) continue;
    if (t.startsWith('#EXTINF:')) {
      current = { name: '', url: '', tvgId: '' };
      var m = t.match(/,(.+)$/);
      if (m) current.name = m[1].trim();
      var idMatch = t.match(/tvg-id="([^"]*)"/);
      if (idMatch) current.tvgId = idMatch[1];
    } else if (t && !t.startsWith('#') && current) {
      current.url = t;
      channels.push(current);
      current = null;
    }
  }
  return channels;
}

function displayChannelsFlat(channels) {
  var list = document.getElementById('channelList');
  if (!channels.length) { list.innerHTML = '<div class="empty-state"><p>No channels found</p></div>'; return; }
  list.innerHTML = channels.map(function(ch, i) {
    return '<div class="channel-item" data-idx="'+i+'">'
      + '<div class="info"><div class="ch-name">'+escapeHtml(ch.name||'Unknown')+'</div><div class="ch-url">'+escapeHtml(ch.url)+'</div></div>'
      + '<div class="ch-actions">'
      + '<button class="play-btn" data-action="play">▶ Play</button>'
      + '<button class="copy-btn" data-action="copy">Copy</button></div></div>';
  }).join('');
}

function filterChannels() {
  var q = document.getElementById('channelSearch').value.toLowerCase();
  filteredChannels = currentChannels.filter(function(ch) { return ch.name.toLowerCase().includes(q) || ch.url.toLowerCase().includes(q); });
  if (currentSource === 'countries') {
    displayChannelsFlat(filteredChannels);
  } else {
    displayChannelsByCountry(filteredChannels);
  }
}

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('mobile-show'); }

function showToast(msg) { var t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(function() { t.classList.remove('show'); }, 2000); }

function escapeHtml(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }

function closePlayer() {
  document.getElementById('playerModal').classList.remove('open');
  if (hls) { hls.destroy(); hls = null; }
  var v = document.getElementById('playerVideo');
  v.removeAttribute('src');
  if (document.fullscreenElement) document.exitFullscreen();
}

function copyCurrentUrl() { if (!currentPlaylistUrl) return showToast('No playlist loaded'); navigator.clipboard.writeText(currentPlaylistUrl).then(function() { showToast('Copied!'); }).catch(function(){}); }

document.getElementById('channelList').addEventListener('click', function(e) {
  var btn = e.target.closest('button[data-action]');
  if (!btn) return;
  var item = btn.closest('.channel-item');
  if (!item) return;
  var ch = filteredChannels[parseInt(item.dataset.idx)];
  if (!ch) return;
  if (btn.dataset.action === 'play') {
    document.getElementById('playerTitle').textContent = ch.name;
    document.getElementById('playerModal').classList.add('open');
    var video = document.getElementById('playerVideo');
    if (hls) { hls.destroy(); hls = null; }
    video.removeAttribute('src');
    try { video.requestFullscreen(); } catch(e) {}
    if (ch.url.indexOf('.m3u8') > -1 && Hls.isSupported()) {
      hls = new Hls();
      hls.loadSource(ch.url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, function() { video.play().catch(function(){}); });
    } else {
      video.src = ch.url;
      video.play().catch(function(){});
    }
  } else if (btn.dataset.action === 'copy') {
    navigator.clipboard.writeText(ch.url).then(function() { showToast('Copied!'); }).catch(function(){});
  }
});

document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closePlayer(); });

buildSidebar();
